; =============================================================================
; PlatformIO Configuration File for QUVI ESP32-S3 Firmware
; Target Board: Wemos LOLIN S3 V1.0.0
; =============================================================================

[platformio]
; Specify that the source directory is the current directory (to load the .ino file)
src_dir = .

[env:lolin_s3]
platform = espressif32
board = lolin_s3
framework = arduino

; Serial Monitor Baudrate (디버그 모니터 전용 — micro-ROS 전송 보드레이트와 무관).
; micro-ROS 전송 보드레이트는 Config.h 의 MICRO_ROS_BAUDRATE(921600) 참조.
monitor_speed = 115200

; USB CDC Configuration (Enables Serial output over the native USB port)
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Library Dependencies
; PlatformIO will automatically download and manage these libraries upon compilation
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.3
    https://github.com/micro-ROS/micro_ros_platformio.git
