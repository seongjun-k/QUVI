services:
  quvi-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quvi-dev
    image: quvi:latest

    privileged: true
    ipc: host
    network_mode: host

    runtime: nvidia

    volumes:
      - ../src:/workspace/src
      - ../data:/workspace/data
      - ../scripts:/workspace/scripts
      - ../lerobot:/workspace/lerobot
      - ../firmware:/workspace/firmware
      - /dev:/dev
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
      - ${HOME}/physical_ai_tools:/physical_ai_tools:ro

    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - PIP_ROOT_USER_ACTION=ignore

    stdin_open: true
    tty: true

    command: bash
