hmi_node:
  ros__parameters:
    # ─── 웹 서버 설정 ───
    host: "0.0.0.0"
    port: 5000
    debug: false

    # ─── 카메라 토픽 ───
    sidecam_topic: "/camera1/image_raw/compressed"
    camera2_topic: "/camera2/image_raw/compressed"
    inspect_debug_topic: "/inspect/debug_image"

    # ─── MJPEG 스트리밍 ───
    jpeg_quality: 70
    stream_fps: 15
